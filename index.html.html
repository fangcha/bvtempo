<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Tournament Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    button { font-family: inherit; font-size: 13px; cursor: pointer; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; padding: 6px 12px; transition: background 0.12s; }
    button:hover { background: #f0efeb; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    input { font-family: inherit; font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; padding: 7px 10px; background: #fff; color: #1a1a1a; outline: none; }
    input:focus { border-color: #888; }

    #setup { max-width: 520px; margin: 0 auto; }
    #setup h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
    .col-labels { display: flex; gap: 8px; margin-bottom: 4px; }
    .col-labels .cn { font-size: 12px; color: #888; flex: 1 1 auto; min-width: 0; }
    .col-labels .ct { font-size: 12px; color: #888; width: 56px; flex: 0 0 56px; text-align: right; }
    .col-labels .cx { width: 32px; flex: 0 0 32px; }
    .player-entry { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .name-input { flex: 1 1 auto; min-width: 0; display: block; }
    .bank-input { flex: 0 0 56px; width: 56px; min-width: 56px; max-width: 56px; text-align: center; display: block; }
    .remove-btn { flex: 0 0 32px; background: none; border: none; color: #aaa; font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 8px; cursor: pointer; }
    .remove-btn:hover { background: #f0efeb; color: #c0392b; }
    .section-label { font-size: 12px; font-weight: 500; color: #888; margin: 1.25rem 0 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
    .stage-row { display: flex; align-items: center; gap: 8px; }
    .stage-row label { font-size: 13px; width: 64px; flex: none; }
    .stage-row input { flex: 1; min-width: 0; }
    .stage-row span { font-size: 12px; color: #888; }
    #add-player-btn { width: 100%; margin-bottom: 0.75rem; }
    #start-btn { width: 100%; font-size: 15px; padding: 10px; }

    #clock-view { display: none; max-width: 700px; margin: 0 auto; }
    .clock-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .clock-top-left { display: flex; align-items: center; gap: 12px; }
    .clock-top h2 { font-size: 18px; font-weight: 500; }
    .hand-badge { font-size: 12px; font-weight: 500; background: #ece9e0; color: #666; border: 0.5px solid #ccc; border-radius: 8px; padding: 3px 10px; }
    .stage-bar { display: flex; margin-bottom: 1rem; background: #ece9e0; border: 0.5px solid #ccc; border-radius: 12px; overflow: hidden; }
    .stage-pip { flex: 1; text-align: center; padding: 8px 4px; font-size: 13px; color: #aaa; border-right: 0.5px solid #ccc; }
    .stage-pip:last-child { border-right: none; }
    .stage-pip.current { background: #fff; color: #1a1a1a; font-weight: 500; }
    .stage-pip.done { color: #ccc; }
    .stage-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    #next-stage-btn, #new-hand-btn { font-size: 13px; padding: 7px 16px; }
    .street-clock-info { font-size: 12px; color: #888; margin-left: auto; }

    #spotlight { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 2rem 2rem 1.5rem; margin-bottom: 1.5rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 1rem; position: relative; }
    #spotlight.empty { background: #f5f4f0; }
    .spotlight-hint { font-size: 13px; color: #bbb; }
    .spotlight-name { font-size: 22px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .spotlight-folded-badge { font-size: 11px; font-weight: 500; background: #ece9e0; color: #888; border: 0.5px solid #ccc; border-radius: 8px; padding: 2px 8px; }
    .btn-badge { display: inline-flex; align-items: center; justify-content: center; background: #1a1a1a; color: #fff; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; border-radius: 50%; width: 26px; height: 26px; flex: none; }
    .btn-badge-mini { display: inline-flex; align-items: center; justify-content: center; background: #1a1a1a; color: #fff; font-size: 9px; font-weight: 500; letter-spacing: 0.06em; border-radius: 50%; width: 20px; height: 20px; flex: none; }

    .spotlight-timers { display: flex; align-items: flex-end; gap: 20px; justify-content: center; }
    .spotlight-timer-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .spotlight-timer-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
    .spotlight-street { font-size: 56px; font-weight: 500; font-variant-numeric: tabular-nums; color: #1a1a1a; line-height: 1; }
    .spotlight-street.active-phase { color: #1D9E75; }
    .spotlight-street.paused-phase { color: #BA7517; }
    .spotlight-street.done-phase { color: #ccc; }
    .spotlight-bank { font-size: 36px; font-weight: 500; font-variant-numeric: tabular-nums; color: #aaa; line-height: 1; }
    .spotlight-bank.active-phase { color: #1a1a1a; }
    .spotlight-bank.paused-phase { color: #BA7517; }
    .spotlight-bank.warning { color: #D85A30; }
    .spotlight-bank.zero { color: #ccc; }
    .spotlight-sep { font-size: 36px; color: #ddd; padding-bottom: 4px; }

    .spotlight-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; align-items: center; }
    .spotlight-turn-btn { font-size: 14px; padding: 8px 24px; min-width: 130px; }
    .spotlight-turn-btn.active-btn { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .spotlight-turn-btn.active-btn:hover { background: #0F6E56; border-color: #0F6E56; }
    .spotlight-fold-btn { font-size: 14px; padding: 8px 20px; }
    .spotlight-fold-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .pause-btn { font-size: 14px; padding: 8px 16px; }
    .pause-btn.paused { background: #FAEEDA; border-color: #BA7517; color: #633806; }
    .pause-btn.paused:hover { background: #FAC775; }
    .pause-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .menu-wrap { position: relative; }
    .menu-trigger { font-size: 14px; padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; align-items: center; justify-content: center; }
    .menu-trigger span { display: block; width: 14px; height: 1.5px; background: currentColor; border-radius: 2px; }
    .dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 8px; min-width: 210px; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .dropdown.open { display: block; }
    .dropdown-section-label { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 6px 6px; }
    .dropdown-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .dropdown-row:last-child { margin-bottom: 0; }
    .d-btn { flex: 1; font-size: 12px; padding: 6px 4px; }
    .d-btn-full { width: 100%; font-size: 12px; padding: 6px 8px; text-align: left; display: flex; align-items: center; gap: 8px; }
    .d-btn-danger { color: #a32d2d; }
    .d-btn-danger:hover { background: #fdf0f0; border-color: #f09595; }
    .dropdown-divider { border: none; border-top: 0.5px solid #eee; margin: 6px 0; }

    #players-strip { display: flex; flex-wrap: wrap; gap: 8px; }
    .mini-card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 10px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; min-width: 110px; flex: 1; transition: border-color 0.12s; user-select: none; }
    .mini-card:hover { border-color: #bbb; }
    .mini-card.selected { border: 2px solid #1D9E75; }
    .mini-card.active-timer { border: 2px solid #1D9E75; background: #E1F5EE; }
    .mini-card.paused-timer { border: 2px solid #BA7517; background: #FAEEDA; }
    .mini-card.folded { opacity: 0.45; }
    .mini-card.out { opacity: 0.25; pointer-events: none; }
    .mini-card-top { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .mini-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .mini-bank { font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; color: #aaa; line-height: 1.1; }
    .mini-bank.active-phase { color: #1a1a1a; }
    .mini-bank.warning { color: #D85A30; }
    .mini-bank.zero { color: #ccc; }
    .mini-status { font-size: 10px; color: #bbb; }
  </style>
</head>
<body>
<div id="app">
  <div id="setup">
    <h2>Poker tournament clock</h2>
    <div class="col-labels"><span class="cn">Player name</span><span class="ct">Bank (sec)</span><span class="cx"></span></div>
    <div id="player-list"></div>
    <button id="add-player-btn">+ Add player</button>
    <div class="section-label">Street clock (seconds per turn)</div>
    <div class="stage-grid">
      <div class="stage-row"><label>Preflop</label><input type="number" id="b-preflop" value="20" min="0" max="999" step="5"/><span>sec</span></div>
      <div class="stage-row"><label>Flop</label><input type="number" id="b-flop" value="30" min="0" max="999" step="5"/><span>sec</span></div>
      <div class="stage-row"><label>Turn</label><input type="number" id="b-turn" value="30" min="0" max="999" step="5"/><span>sec</span></div>
      <div class="stage-row"><label>River</label><input type="number" id="b-river" value="30" min="0" max="999" step="5"/><span>sec</span></div>
    </div>
    <button id="start-btn">Start tournament</button>
  </div>

  <div id="clock-view">
    <div class="clock-top">
      <div class="clock-top-left">
        <h2>Tournament clock</h2>
        <span class="hand-badge" id="hand-badge">Hand 1</span>
      </div>
      <button id="reset-btn">+ New tournament</button>
    </div>
    <div class="stage-bar">
      <div class="stage-pip current" id="pip-0">Preflop</div>
      <div class="stage-pip" id="pip-1">Flop</div>
      <div class="stage-pip" id="pip-2">Turn</div>
      <div class="stage-pip" id="pip-3">River</div>
    </div>
    <div class="stage-controls">
      <button id="next-stage-btn">Next street →</button>
      <button id="new-hand-btn">New hand</button>
      <span class="street-clock-info" id="street-info"></span>
    </div>
    <div id="spotlight"><span class="spotlight-hint">Select a player below</span></div>
    <div id="players-strip"></div>
  </div>
</div>

<script>
  const STAGES = ["Preflop","Flop","Turn","River"];
  let streetTimes = [20,30,30,30];
  let players = [];
  let currentStage = 0, currentHand = 1;
  let activeIndex = null, pausedIndex = null, selectedIndex = null, btnIndex = null;
  let intervalId = null, menuOpenIndex = null;

  function fmt(s) {
    if (s <= 0) return "0:00";
    const m = Math.floor(s/60), sec = s%60;
    return m+":"+String(sec).padStart(2,"0");
  }

  function stopActive() {
    if (activeIndex !== null) { players[activeIndex].active=false; players[activeIndex].phase="idle"; clearInterval(intervalId); intervalId=null; activeIndex=null; }
    pausedIndex=null;
  }

  function nextEligible(fromIndex) {
    const n=players.length;
    for (let step=1; step<n; step++) { const j=(fromIndex+step)%n; if (!players[j].folded&&!players[j].out) return j; }
    return -1;
  }

  function startPlayerTimer(i) {
    if (activeIndex!==null){players[activeIndex].active=false;players[activeIndex].phase="idle";}
    clearInterval(intervalId); intervalId=null;
    players[i].active=true; players[i].phase="street"; players[i].streetLeft=streetTimes[currentStage];
    activeIndex=i; pausedIndex=null;
    intervalId=setInterval(()=>tick(i),1000);
  }

  function startNewHand() {
    stopActive(); currentStage=0; currentHand++;
    // Move BTN to next non-knocked-out player
    if (btnIndex !== null) {
      const n=players.length;
      for (let step=1; step<=n; step++) { const j=(btnIndex+step)%n; if (!players[j].out){btnIndex=j;break;} }
    }
    players.forEach(p=>{if(!p.out){p.folded=false;p.phase="idle";p.active=false;}});
    document.getElementById("hand-badge").textContent="Hand "+currentHand;
    document.getElementById("next-stage-btn").disabled=false;
    updateStageBar(); render();
  }

  function addPlayerRow(name="", seconds=60) {
    const list=document.getElementById("player-list");
    const row=document.createElement("div"); row.className="player-entry";
    row.innerHTML=`<input type="text" class="name-input" placeholder="Player name" value="${name}"><input type="number" class="bank-input" min="1" max="99999" value="${seconds}" step="5"><button class="remove-btn">×</button>`;
    row.querySelector(".remove-btn").onclick=()=>row.remove();
    list.appendChild(row);
  }

  document.getElementById("add-player-btn").onclick=()=>addPlayerRow();

  document.getElementById("start-btn").onclick=()=>{
    streetTimes=[
      parseInt(document.getElementById("b-preflop").value)||20,
      parseInt(document.getElementById("b-flop").value)||30,
      parseInt(document.getElementById("b-turn").value)||30,
      parseInt(document.getElementById("b-river").value)||30,
    ];
    const rows=document.querySelectorAll(".player-entry"); players=[];
    rows.forEach(row=>{
      const name=row.querySelector(".name-input").value.trim();
      const secs=parseInt(row.querySelector(".bank-input").value)||60;
      if(name) players.push({name,bank:secs,streetLeft:0,phase:"idle",active:false,out:false,folded:false});
    });
    if(players.length<2){alert("Add at least 2 players.");return;}
    currentStage=0; currentHand=1; activeIndex=null; pausedIndex=null; selectedIndex=null; btnIndex=0;
    document.getElementById("setup").style.display="none";
    document.getElementById("clock-view").style.display="block";
    document.getElementById("hand-badge").textContent="Hand 1";
    updateStageBar(); render();
  };

  document.getElementById("reset-btn").onclick=()=>{
    stopActive(); players=[]; currentStage=0; currentHand=1; selectedIndex=null; pausedIndex=null; btnIndex=null;
    document.getElementById("setup").style.display="block";
    document.getElementById("clock-view").style.display="none";
    document.getElementById("next-stage-btn").disabled=false;
  };

  document.getElementById("next-stage-btn").onclick=()=>{
    if(currentStage>=3) return;
    stopActive(); currentStage++;
    updateStageBar(); render();
    if(currentStage===3) document.getElementById("next-stage-btn").disabled=true;
  };

  document.getElementById("new-hand-btn").onclick=()=>startNewHand();

  document.addEventListener("click", e=>{
    if(menuOpenIndex!==null&&!e.target.closest(".menu-wrap")){menuOpenIndex=null;renderSpotlight();}
  });

  function updateStageBar() {
    STAGES.forEach((_,i)=>{document.getElementById("pip-"+i).className="stage-pip"+(i===currentStage?" current":i<currentStage?" done":"");});
    document.getElementById("street-info").textContent="Street clock: "+streetTimes[currentStage]+"s per turn";
  }

  function selectPlayer(i){if(players[i].out)return;selectedIndex=i;render();}
  function render(){renderSpotlight();renderStrip();}
  function toggleMenu(i){menuOpenIndex=menuOpenIndex===i?null:i;renderSpotlight();}
  function assignBtn(i){btnIndex=i;menuOpenIndex=null;render();}

  function renderSpotlight(){
    const el=document.getElementById("spotlight");
    if(selectedIndex===null||!players[selectedIndex]){el.className="empty";el.innerHTML='<span class="spotlight-hint">Select a player below</span>';return;}
    el.className="";
    const p=players[selectedIndex]; const i=selectedIndex;
    const isPaused=pausedIndex===i, isBtn=btnIndex===i, menuOpen=menuOpenIndex===i;

    const streetDisplay=(p.active||isPaused)&&p.phase==="street"?fmt(p.streetLeft):p.phase==="bank"?"0:00":fmt(streetTimes[currentStage]);
    const bankDisplay=fmt(p.bank);

    let streetClass="spotlight-street";
    if(p.phase==="street"&&p.active) streetClass+=" active-phase";
    else if(p.phase==="street"&&isPaused) streetClass+=" paused-phase";
    else if(p.phase==="bank") streetClass+=" done-phase";

    let bankClass="spotlight-bank";
    if(p.phase==="bank"&&p.active) bankClass+=" active-phase";
    else if(p.phase==="bank"&&isPaused) bankClass+=" paused-phase";
    if(p.bank<30&&p.bank>0) bankClass+=" warning";
    else if(p.bank<=0) bankClass+=" zero";

    const btnLabel=p.active?"Stop turn":"It's my turn";
    const btnClass="spotlight-turn-btn"+(p.active?" active-btn":"");
    const turnDisabled=(p.out||p.folded)?"disabled":"";
    const foldDisabled=(p.out||p.folded)?"disabled":"";
    const pauseDisabled=(!p.active&&!isPaused)?"disabled":"";
    const pauseLabel=isPaused?"Resume":"Pause";
    const pauseClass="pause-btn"+(isPaused?" paused":"");
    const btnBadge=isBtn?'<span class="btn-badge">BTN</span>':"";

    el.innerHTML=`
      <div class="spotlight-name">${p.name}${btnBadge}${p.folded?'<span class="spotlight-folded-badge">folded</span>':""}</div>
      <div class="spotlight-timers">
        <div class="spotlight-timer-block">
          <span class="spotlight-timer-label">Street</span>
          <span class="${streetClass}" id="sp-st">${streetDisplay}</span>
        </div>
        <span class="spotlight-sep">|</span>
        <div class="spotlight-timer-block">
          <span class="spotlight-timer-label">Time bank</span>
          <span class="${bankClass}" id="sp-bk">${bankDisplay}</span>
        </div>
      </div>
      <div class="spotlight-actions">
        <button class="${btnClass}" onclick="toggleTurn(${i})" ${turnDisabled}>${btnLabel}</button>
        <button class="${pauseClass}" onclick="togglePause(${i})" ${pauseDisabled}>${pauseLabel}</button>
        <button class="spotlight-fold-btn" onclick="foldPlayer(${i})" ${foldDisabled}>Fold</button>
        <div class="menu-wrap">
          <button class="menu-trigger" onclick="toggleMenu(${i})"><span></span><span></span><span></span></button>
          <div class="dropdown${menuOpen?" open":""}">
            <div class="dropdown-section-label">Time bank</div>
            <div class="dropdown-row">
              <button class="d-btn" onclick="adjustBank(${i},-30);toggleMenu(${i})">−30s</button>
              <button class="d-btn" onclick="adjustBank(${i},-1);toggleMenu(${i})">−1s</button>
              <button class="d-btn" onclick="adjustBank(${i},1);toggleMenu(${i})">+1s</button>
              <button class="d-btn" onclick="adjustBank(${i},30);toggleMenu(${i})">+30s</button>
            </div>
            <hr class="dropdown-divider">
            <div class="dropdown-section-label">Dealer button</div>
            <div class="dropdown-row">
              <button class="d-btn-full" onclick="assignBtn(${i})" ${isBtn?"disabled":""}>
                <span class="btn-badge" style="width:18px;height:18px;font-size:9px;">BTN</span>
                ${isBtn?"Already dealer":"Move BTN here"}
              </button>
            </div>
            <hr class="dropdown-divider">
            <div class="dropdown-row">
              <button class="d-btn d-btn-danger" onclick="knockOut(${i})">Knock out</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderStrip(){
    const strip=document.getElementById("players-strip"); strip.innerHTML="";
    players.forEach((p,i)=>{
      const isPaused=pausedIndex===i, isBtn=btnIndex===i;
      const bankClass="mini-bank"+(p.phase==="bank"&&p.active?" active-phase":"")+(p.bank<30&&p.bank>0?" warning":"")+(p.bank<=0?" zero":"");
      const status=p.out?"knocked out":p.folded?"folded":isPaused?"paused":p.active?"active":"";
      let cardClass="mini-card";
      if(isPaused) cardClass+=" paused-timer";
      else if(p.active) cardClass+=" active-timer";
      else if(i===selectedIndex) cardClass+=" selected";
      if(p.folded) cardClass+=" folded";
      if(p.out) cardClass+=" out";
      const card=document.createElement("div"); card.className=cardClass;
      card.onclick=()=>selectPlayer(i);
      card.innerHTML=`
        <div class="mini-card-top">
          <div class="mini-name">${p.name}</div>
          ${isBtn?'<span class="btn-badge-mini">BTN</span>':""}
        </div>
        <div class="${bankClass}" id="mini-bk-${i}">${fmt(p.bank)}</div>
        ${status?`<div class="mini-status">${status}</div>`:""}
      `;
      strip.appendChild(card);
    });
  }

  function toggleTurn(i){
    if(activeIndex===i){players[i].active=false;players[i].phase="idle";clearInterval(intervalId);intervalId=null;activeIndex=null;pausedIndex=null;}
    else{
      if(activeIndex!==null){players[activeIndex].active=false;players[activeIndex].phase="idle";}
      if(pausedIndex!==null&&pausedIndex!==i) pausedIndex=null;
      players[i].active=true;players[i].phase="street";players[i].streetLeft=streetTimes[currentStage];
      activeIndex=i;pausedIndex=null;clearInterval(intervalId);intervalId=setInterval(()=>tick(i),1000);
    }
    render();
  }

  function togglePause(i){
    if(activeIndex===i){players[i].active=false;clearInterval(intervalId);intervalId=null;activeIndex=null;pausedIndex=i;}
    else if(pausedIndex===i){players[i].active=true;activeIndex=i;pausedIndex=null;clearInterval(intervalId);intervalId=setInterval(()=>tick(i),1000);}
    render();
  }

  function foldPlayer(i){
    if(players[i].folded||players[i].out) return;
    const wasActive=activeIndex===i, wasPaused=pausedIndex===i;
    players[i].active=false;players[i].phase="idle";players[i].folded=true;
    if(wasActive){clearInterval(intervalId);intervalId=null;activeIndex=null;pausedIndex=null;const next=nextEligible(i);if(next!==-1){selectedIndex=next;startPlayerTimer(next);}}
    else if(wasPaused){pausedIndex=null;}
    render();
  }

  function tick(i){
    const p=players[i];
    if(p.phase==="street"){
      p.streetLeft--;
      if(i===selectedIndex){const el=document.getElementById("sp-st");if(el)el.textContent=fmt(p.streetLeft);}
      if(p.streetLeft<=0){
        p.phase="bank";
        if(i===selectedIndex){const el=document.getElementById("sp-st");if(el){el.textContent="0:00";el.className="spotlight-street done-phase";}const bk=document.getElementById("sp-bk");if(bk)bk.className="spotlight-bank active-phase"+(p.bank<30?" warning":"")+(p.bank<=0?" zero":"");}
        if(p.bank<=0){p.active=false;p.phase="idle";clearInterval(intervalId);intervalId=null;activeIndex=null;pausedIndex=null;render();}
      }
    } else if(p.phase==="bank"){
      if(p.bank>0){
        p.bank--;
        if(i===selectedIndex){const bk=document.getElementById("sp-bk");if(bk){bk.textContent=fmt(p.bank);bk.className="spotlight-bank active-phase"+(p.bank<30&&p.bank>0?" warning":"")+(p.bank<=0?" zero":"");}}
        const mini=document.getElementById("mini-bk-"+i);if(mini){mini.textContent=fmt(p.bank);mini.className="mini-bank active-phase"+(p.bank<30&&p.bank>0?" warning":"")+(p.bank<=0?" zero":"");}
        if(p.bank<=0){p.active=false;p.phase="idle";clearInterval(intervalId);intervalId=null;activeIndex=null;pausedIndex=null;render();}
      }
    }
  }

  function adjustBank(i,delta){
    players[i].bank=Math.max(0,players[i].bank+delta);
    if(i===selectedIndex){const bk=document.getElementById("sp-bk");if(bk){const ia=players[i].phase==="bank"&&players[i].active;bk.textContent=fmt(players[i].bank);bk.className="spotlight-bank"+(ia?" active-phase":"")+(players[i].bank<30&&players[i].bank>0?" warning":"")+(players[i].bank<=0?" zero":"");}}
    const mini=document.getElementById("mini-bk-"+i);if(mini){const ia=players[i].phase==="bank"&&players[i].active;mini.textContent=fmt(players[i].bank);mini.className="mini-bank"+(ia?" active-phase":"")+(players[i].bank<30&&players[i].bank>0?" warning":"")+(players[i].bank<=0?" zero":"");}
  }

  function knockOut(i){
    if(!confirm("Knock out "+players[i].name+"?")) return;
    if(activeIndex===i){clearInterval(intervalId);intervalId=null;activeIndex=null;}
    if(pausedIndex===i) pausedIndex=null;
    if(btnIndex===i) btnIndex=null;
    players[i].out=true;players[i].active=false;players[i].phase="idle";players[i].folded=false;
    if(selectedIndex===i) selectedIndex=null;
    menuOpenIndex=null; render();
  }

  addPlayerRow("Player 1",60);
  addPlayerRow("Player 2",60);
  addPlayerRow("Player 3",60);
</script>
</body>
</html>
